<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/css/base.css') }}">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Profil</h2>
        <a class="btn btn-outline-secondary" href="{{ url_for('dashboard.admin_dashboard') }}">Kembali</a>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <div class="card shadow-sm border-0">
        <div class="card-body">
            <p class="text-muted mb-4">Isi bagian ini dengan data diri Anda agar halaman utama terlihat lebih personal dan profesional.</p>
            <form method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">Nama</label>
                    <input class="form-control" type="text" name="nama" value="{{ profil['nama'] if profil else '' }}" placeholder="Contoh: Meyy">
                </div>
                <div class="mb-3">
                    <label class="form-label">Judul Profesi</label>
                    <input class="form-control" type="text" name="judul_profesi" value="{{ profil['judul_profesi'] if profil else '' }}" placeholder="Contoh: Web Developer / Designer / Content Creator">
                </div>
                <div class="mb-3">
                    <label class="form-label">Deskripsi</label>
                    <textarea class="form-control" name="deskripsi" rows="4" placeholder="Tuliskan deskripsi singkat tentang diri Anda.">{{ profil['deskripsi'] if profil else '' }}</textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Foto</label>
                    <input class="form-control" type="file" name="foto">
                    <input type="hidden" name="old_foto_url" value="{{ profil['foto_url'] if profil else '' }}">
                </div>
                <button class="btn btn-primary" type="submit">Simpan Profil</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
